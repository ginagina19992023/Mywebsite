<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Creative Portfolio Sphere</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="home-body">
    <header class="topbar">
      <div class="brand">Creative Portfolio</div>
      <a class="pill-link" href="/admin.html">Edit Studio</a>
    </header>

    <main class="home-layout">
      <section class="sphere-section">
        <div class="sphere-wrap">
          <div id="media-sphere" class="media-sphere"></div>
        </div>
      </section>

      <section class="hero-copy">
        <h1 id="profile-name">Loading...</h1>
        <p id="profile-tagline" class="tagline"></p>
        <p id="profile-summary" class="summary"></p>
        <p id="profile-intro" class="intro"></p>
      </section>

      <section class="info-grid">
        <article class="panel">
          <h2>AI Search</h2>
          <div id="chat-log" class="chat-log"></div>
          <form id="chat-form" class="chat-form">
            <input id="chat-input" type="text" placeholder="Ask about my projects..." required />
            <button type="submit">Search</button>
          </form>
        </article>

        <article class="panel">
          <h2>Categories</h2>
          <div id="categories" class="chips"></div>
          <h2>Projects</h2>
          <div id="projects" class="project-list"></div>
        </article>
      </section>
    </main>

    <script src="/script.js"></script>
  </body>
</html>
