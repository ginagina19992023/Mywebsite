<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit Studio</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="admin-body">
    <main class="layout admin-layout">
      <section class="card">
        <a class="pill-link" href="/">Back to Home</a>
        <h1>Edit Studio</h1>
        <p class="hint">Private page. Enter ADMIN_TOKEN to update profile and generate project pages.</p>
        <input id="admin-token" type="password" placeholder="Enter ADMIN_TOKEN" />
      </section>

      <section class="card">
        <h2>Profile Settings</h2>
        <input id="name" placeholder="Name" />
        <input id="tagline" placeholder="Tagline" />
        <textarea id="summary" rows="3" placeholder="Summary"></textarea>
        <textarea id="intro" rows="4" placeholder="Introduction"></textarea>
        <button id="save-profile">Save Profile</button>
        <p id="profile-status" class="hint"></p>
      </section>

      <section class="card">
        <h2>AI Project Builder</h2>
        <input id="project-title" placeholder="Optional project title" />
        <textarea id="project-content" rows="8" placeholder="Paste your project content. AI will package it into a page and classify it."></textarea>
        <input id="project-files" type="file" multiple />
        <button id="generate-project">Generate Page</button>
        <p id="generate-status" class="hint"></p>
      </section>
    </main>
    <script src="/admin.js"></script>
  </body>
</html>
